; PlatformIO Project Configuration File
; --- Master Configuration for VCS V1.4 ---

[platformio]
default_envs = nanoatmega328new, nano33ble

[common]
; Use deep+ to ensure nested files in /lib can find these
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps = 
    dlloydev/QuickPID @ ^3.1.9
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit BusIO
    Wire
    SPI

; 1. The Primary Target (Nano 33 BLE)
[env:nano33ble]
extends = common
platform = nordicnrf52
board = nano33ble
framework = arduino
build_flags = -D NANO_33_BLE
upload_protocol = sam-ba

; 2. The Generic Target (Classic Arduino Nano - ATmega328P NEW Bootloader)
[env:nanoatmega328new]
extends = common
platform = atmelavr
board = nanoatmega328
framework = arduino
board_build.mcu = atmega328p
upload_port = COM3
upload_protocol = arduino
upload_speed = 57600
build_flags = -D NANO_ATMEGA328