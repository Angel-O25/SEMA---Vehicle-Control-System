; PlatformIO Project Configuration File
; --- Master Configuration for SIDLAK 2 VCS V1.5 ---

[platformio]
; Set ESP32 as the primary target, fallback to ATmega for simulation
default_envs = esp32_wroom, nanoatmega328new

[common]
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps = 
    dlloydev/QuickPID @ ^3.1.9
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit BusIO
    Wire
    SPI

; 1. The Primary Target (ESP32-WROOM-32)
[env:esp32_wroom]
extends = common
; Locking to 6.8.1 guarantees Arduino ESP32 core v2.0.17 / ESP-IDF 4.4
platform = espressif32 @ 6.8.1
board = esp32dev
framework = arduino
upload_speed = 921600
; Activate all new ESP32 hardware layers and FreeRTOS tasks
build_flags = 
    -D ESP32_VCS
; Append the asynchronous web server libraries for the Core 1 AP Task
lib_deps =
    ${common.lib_deps}
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

; 2. The Generic Target (Classic Arduino Nano - ATmega328P NEW Bootloader)
; Retained for vcs_simulation.cpp breadboard testing
[env:nanoatmega328new]
extends = common
platform = atmelavr
board = nanoatmega328
framework = arduino
board_build.mcu = atmega328p
upload_port = COM3
upload_protocol = arduino
upload_speed = 57600
build_flags = 
    -D NANO_ATMEGA328

; [DEPRECATED] The Legacy Target (Nano 33 BLE)
[env:nano33ble]
extends = common
platform = nordicnrf52
board = nano33ble
framework = arduino
build_flags = -D NANO_33_BLE
upload_protocol = sam-ba