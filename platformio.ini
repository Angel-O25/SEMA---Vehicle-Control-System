; PlatformIO Project Configuration File
; --- SIDLAK 2 VCS V1.5 — ESP32-only ---

[platformio]
default_envs = esp32_wroom

; Primary (and only) target: ESP32-WROOM-32 (38-pin)
; Locking espressif32 to 6.8.1 guarantees Arduino ESP32 core v2.0.17 / ESP-IDF 4.4
[env:esp32_wroom]
platform = espressif32 @ 6.8.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+

build_flags =
    -D ESP32_VCS

lib_deps =
    dlloydev/QuickPID @ ^3.1.9
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit BusIO
    Wire
    SPI
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git